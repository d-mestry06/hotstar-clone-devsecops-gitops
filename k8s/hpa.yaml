apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hotstar-hpa
  namespace: hotstar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hotstar-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hotstar-pdb
  namespace: hotstar
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: hotstar-app
